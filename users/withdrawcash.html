<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Cash | PESAQUASH</title>
    <!-- Tailwind CSS Script -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <style>
        body, h1, h2, h3, h4, h5, h6 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Smooth border radius overrides */
        .glass-card, .bg-slate-50, .bg-white, .bg-slate-100, .bg-blue-50\/50, .bg-blue-50\/80 {
            border-radius: 24px !important;
        }
        button, input, select, a.inline-block, a.block, .rounded-xl, .rounded-2xl {
            border-radius: 16px !important;
        }

        /* Big size bold thick font overrides */
        h1, h2, h3, h4 {
            font-weight: 900 !important;
            letter-spacing: -0.035em !important;
        }
        .font-black, .font-extrabold, .font-bold {
            font-weight: 850 !important;
        }
        .text-[10px], .text-[9px] {
            font-size: 11px !important;
            font-weight: 700 !important;
        }
        .text-xs {
            font-size: 13px !important;
        }
        .text-sm {
            font-size: 15px !important;
        }
        .text-base {
            font-size: 18px !important;
        }
        .text-lg {
            font-size: 20px !important;
        }
        .text-xl {
            font-size: 24px !important;
        }
        .text-2xl {
            font-size: 28px !important;
        }
        .text-3xl {
            font-size: 36px !important;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }
    </style>
    <!-- Custom Alerts Library -->
    <script src="../public/js/system-alerts.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem("maintenance_mode") === "true") {
                document.body.innerHTML = `
                    <div class="min-h-screen bg-[#F8FAFC] flex flex-col justify-center items-center px-4 font-sans selection:bg-rose-500/10 selection:text-rose-900">
                        <div class="max-w-md w-full glass-card bg-blue-50/50 border border-blue-200/60 p-8 rounded-2xl shadow-xl text-center space-y-5">
                            <div class="h-12 w-12 bg-blue-50 border border-blue-200/60 text-blue-600 rounded-full flex items-center justify-center mx-auto text-xl animate-bounce">⚙️</div>
                            <h2 class="text-xl font-black text-slate-900 uppercase font-mono tracking-wider">System Under Maintenance</h2>
                            <p class="text-xs text-slate-500 font-semibold leading-relaxed">
                                PESAQUASH is currently undergoing scheduled upgrades. Access to the member workspace is temporarily suspended.
                            </p>
                            <div class="pt-2">
                                <a href="../public/signin.html" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase tracking-wider py-3.5 px-6 rounded-xl transition-all shadow-xs">
                                    Return to Log In
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                document.body.className = "bg-[#F8FAFC] min-h-screen flex flex-col justify-center items-center";
            } else if (localStorage.getItem("force_logout") === "true") {
                localStorage.removeItem("logged_in_user");
                localStorage.removeItem("force_logout");
                alert("The administrator has closed the session. You have been logged out.");
                window.location.href = "../public/signin.html";
            }
        });
    </script>
</head>

<body
    class="bg-[#F8FAFC] text-[#1E293B] font-sans antialiased min-h-screen flex flex-col font-semibold selection:bg-amber-500/20 selection:text-amber-800">

    <!-- Top Sticky Header -->
    <header class="sticky top-0 bg-white border-b border-slate-200/80 shadow-xs z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-lg font-black tracking-wider text-slate-900 uppercase font-mono">Withdraw Cash</span>
            </div>

            <div class="flex items-center space-x-3">
                <!-- Notification Bell -->
                <button onclick="alert('No new notifications')" class="relative p-2 text-slate-500 hover:text-blue-600 transition bg-slate-50 hover:bg-slate-100 rounded-xl border border-slate-200 shadow-xs focus:outline-none cursor-pointer">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <span class="absolute top-1.5 right-1.5 h-2 w-2 bg-blue-600 rounded-full ring-2 ring-white"></span>
                </button>
                <!-- Profile Avatar -->
                <a href="userprofile.html" class="p-2 text-slate-500 hover:text-blue-600 transition bg-slate-50 hover:bg-slate-100 rounded-xl border border-slate-200 shadow-xs">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Outbound Payment Framework -->
    <main class="flex-1 max-w-xl mx-auto w-full px-4 py-8 flex flex-col justify-center">

        <div class="text-center mb-6">
            <span class="text-[10px] bg-amber-50 text-amber-700 px-2.5 py-1 rounded-md border border-amber-100 font-mono font-bold uppercase tracking-wider inline-block mb-2">Secure Settlement Vault</span>
            <h1 class="text-xl font-bold text-slate-900 tracking-tight">Withdraw Cash</h1>
            <p class="text-xs text-slate-500 mt-1">Send your wallet balance directly to your mobile money account.</p>
        </div>

        <!-- Master Withdrawal Form Card -->
        <div class="glass-card bg-blue-50/80 rounded-2xl shadow-xl shadow-slate-100/40 p-6 border border-blue-200/60 space-y-5">

            <!-- Static Metrics Ledger Context -->
            <div class="grid grid-cols-2 gap-4 bg-slate-100 p-4 rounded-xl border border-slate-200 font-mono">
                <div>
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider block">Available Balance</span>
                    <span id="available-balance" class="text-sm font-black text-slate-900 block mt-0.5">KES ...</span>
                </div>
                <div>
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider block">Min Withdrawal</span>
                    <span id="min-withdrawal" class="text-sm font-black text-blue-600 block mt-0.5">KES ...</span>
                </div>
            </div>

            <!-- Form -->
            <form id="extraction-form" onsubmit="processExtractionSequence(event)" class="space-y-4">

                <!-- Provider Selection Dropdown -->
                <div>
                    <label
                        class="block text-[10px] font-mono font-bold tracking-wider text-slate-550 uppercase mb-1.5">Mobile money provider</label>
                    <select id="wallet-provider" name="wallet_provider" required
                        class="w-full bg-white border border-slate-200 text-xs font-mono text-slate-750 px-3.5 py-3 rounded-xl focus:outline-none focus:border-slate-900 focus:ring-1 focus:ring-slate-900 font-semibold cursor-pointer">
                        <option value="mpesa" selected>M-Pesa</option>
                    </select>
                </div>

                <!-- Input Amount -->
                <div>
                    <label
                        class="block text-[10px] font-mono font-bold tracking-wider text-slate-400 uppercase mb-1.5">Amount to Withdraw (KES)</label>
                    <input type="number" id="withdraw-amount" min="50" placeholder="50.00" required
                        class="w-full bg-white border border-slate-200 text-xs font-mono text-slate-750 px-3.5 py-3 rounded-xl focus:outline-none focus:border-slate-900 focus:ring-1 focus:ring-slate-900">
                </div>

                <!-- Phone number -->
                <div>
                    <label
                        class="block text-[10px] font-mono font-bold tracking-wider text-slate-400 uppercase mb-1.5">Phone Number</label>
                    <input type="tel" id="withdraw-phone" placeholder="07XXXXXXXX" required pattern="^(07|01)\d{8}$"
                        class="w-full bg-white border border-slate-200 text-xs font-mono text-slate-750 px-3.5 py-3 rounded-xl focus:outline-none focus:border-slate-900 focus:ring-1 focus:ring-slate-900">
                    <span class="text-[9px] text-slate-400 font-mono block mt-1.5">Enter the phone number that will receive the cash.</span>
                </div>

                <!-- Submit Button -->
                <div class="pt-2 space-y-3">
                    <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase tracking-widest py-4 px-4 rounded-xl shadow-md active:scale-[0.98] transition-all cursor-pointer text-center transform">
                        Withdraw Now
                    </button>
                    <a href="userdashboard.html"
                        class="block w-full bg-slate-50 hover:bg-slate-100 text-slate-650 font-bold text-xs uppercase tracking-widest py-3 px-4 rounded-xl border border-slate-250 text-center active:scale-[0.98] transition-all">
                        Cancel & Return
                    </a>
                </div>
            </form>

        </div>
    </main>

    <script>
        let currentUser = null;

        document.addEventListener("DOMContentLoaded", async () => {
            const loggedInUserStr = localStorage.getItem("logged_in_user");
            if (!loggedInUserStr) {
                window.location.href = "../public/signin.html";
                return;
            }
            currentUser = JSON.parse(loggedInUserStr);

            // Pre-fill phone input
            document.getElementById("withdraw-phone").value = currentUser.phone;

            try {
                // Fetch stats to get live balance
                const response = await fetch(`/api/users/dashboard-stats?userId=${currentUser.id}`);
                const data = await response.json();
                
                // Fetch settings for min withdrawal limit
                const settingsResponse = await fetch('/api/admin/settings');
                const settingsData = await settingsResponse.json();

                if (data.success && settingsData.success) {
                    const balance = parseFloat(data.walletBalance);
                    const minLimit = settingsData.settings.min_withdrawal ? parseFloat(settingsData.settings.min_withdrawal) : 50.00;

                    document.getElementById("available-balance").innerText = `KES ${balance.toFixed(2)}`;
                    document.getElementById("min-withdrawal").innerText = `KES ${minLimit.toFixed(2)}`;

                    const amountInput = document.getElementById("withdraw-amount");
                    amountInput.min = minLimit;
                    amountInput.max = balance;
                    amountInput.placeholder = minLimit.toFixed(2);
                }
            } catch (error) {
                console.error("Failed to load withdrawal limits:", error);
            }
        });

        async function processExtractionSequence(event) {
            event.preventDefault();
            if (!currentUser) return;

            const amount = document.getElementById("withdraw-amount").value;
            const phone = document.getElementById("withdraw-phone").value;

            try {
                const response = await fetch('/api/users/withdraw', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: currentUser.id,
                        amount,
                        phone
                    })
                });

                const data = await response.json();
                if (data.success) {
                    alert(data.message || "Withdrawal request submitted successfully!");
                    window.location.href = "userdashboard.html";
                } else {
                    alert(data.message || "Failed to process withdrawal.");
                }
            } catch (error) {
                console.error("Withdrawal error:", error);
                alert("Network error processing withdrawal.");
            }
        }
    </script>

    <!-- Consistent Footer -->
    <footer class="border-t border-slate-200 bg-white py-6 text-center text-[10px] font-mono font-bold tracking-wider text-slate-500 uppercase mt-12">
        <p>© 2026 PESAQUASH AGENCIES. ALL RIGHTS RESERVED.</p>
    </footer>

</body>

</html>
