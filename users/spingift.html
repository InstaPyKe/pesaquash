<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Spin | PESAQUASH</title>
    <!-- Tailwind CSS Script -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/reco-theme.css">
    <style>
        .wheel-pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #869cff;
        }
    </style>
    <!-- Custom Alerts Library -->
    <script src="../public/js/system-alerts.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem("maintenance_mode") === "true") {
                document.body.innerHTML = `
                    <div class="min-h-screen bg-[#F8FAFC] flex flex-col justify-center items-center px-4 font-sans selection:bg-rose-500/10 selection:text-rose-900">
                        <div class="max-w-md w-full glass-card bg-blue-50/50 border border-blue-200/60 p-8 rounded-2xl shadow-xl text-center space-y-5">
                            <div class="h-12 w-12 bg-blue-50 border border-blue-200/60 text-blue-600 rounded-full flex items-center justify-center mx-auto text-xl animate-bounce">⚙️</div>
                            <h2 class="text-xl font-black text-slate-900 uppercase font-mono tracking-wider">System Under Maintenance</h2>
                            <p class="text-xs text-slate-500 font-semibold leading-relaxed">
                                PESAQUASH is currently undergoing scheduled upgrades. Access to the member workspace is temporarily suspended.
                            </p>
                            <div class="pt-2">
                                <a href="../public/signin.html" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase tracking-wider py-3.5 px-6 rounded-xl transition-all shadow-xs">
                                    Return to Log In
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                document.body.className = "bg-[#F8FAFC] min-h-screen flex flex-col justify-center items-center";
            } else if (localStorage.getItem("force_logout") === "true") {
                localStorage.removeItem("logged_in_user");
                localStorage.removeItem("force_logout");
                alert("The administrator has closed the session. You have been logged out.");
                window.location.href = "../public/signin.html";
            }
        });
    </script>
</head>

<body
    class="antialiased min-h-screen flex flex-col font-semibold">

    <!-- Top Sticky Header -->
    <header class="sticky top-0 bg-white border-b border-slate-200/80 shadow-xs z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-lg font-black tracking-wider text-slate-900 uppercase font-mono">Lucky Spin</span>
            </div>

            <div class="flex items-center space-x-3">
                <!-- Notification Bell -->
                <button onclick="alert('No new notifications')" class="relative p-2 text-slate-500 hover:text-blue-600 transition bg-slate-50 hover:bg-slate-100 rounded-xl border border-slate-200 shadow-xs focus:outline-none cursor-pointer">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <span class="absolute top-1.5 right-1.5 h-2 w-2 bg-blue-600 rounded-full ring-2 ring-white"></span>
                </button>
                <!-- Profile Avatar -->
                <a href="userprofile.html" class="p-2 text-slate-500 hover:text-blue-600 transition bg-slate-50 hover:bg-slate-100 rounded-xl border border-slate-200 shadow-xs">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-xl mx-auto w-full px-4 py-8 flex flex-col justify-center">

        <div class="text-center mb-6">
            <span class="text-[10px] bg-amber-50 text-amber-700 px-2.5 py-1 rounded-md border border-amber-100 font-mono font-bold uppercase tracking-wider inline-block mb-2">Daily Lucky Spin</span>
            <h1 class="text-xl font-bold text-slate-900 tracking-tight">Spin & Win Cash</h1>
            <p class="text-xs text-slate-500 mt-1">Spin the wheel to win a free cash reward directly in your wallet!</p>
        </div>

        <div
            class="glass-card bg-slate-50 rounded-2xl shadow-xl shadow-slate-100/40 p-6 border border-slate-200 flex flex-col items-center">

            <div class="relative mb-6 mt-4">
                <div class="absolute -top-3 left-1/2 -translate-x-1/2 z-30 wheel-pointer drop-shadow-sm"></div>

                <canvas id="wheel-canvas" width="320" height="320"
                    class="rounded-full shadow-lg border-4 border-slate-250 transition-transform duration-500 ease-out z-10"></canvas>
            </div>

            <div class="w-full pt-4 border-t border-slate-200 space-y-4">
                <div
                    class="bg-blue-50 px-4 py-3 rounded-xl border border-blue-100 text-center font-mono text-xs text-blue-700">
                    Maximum prize you can win: <b class="text-blue-600 font-bold">KES 50.00</b>
                </div>

                <button id="spin-trigger-btn" onclick="executeSpinSequence()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase tracking-widest py-4 px-4 rounded-xl shadow-md active:scale-[0.98] transition-all cursor-pointer text-center transform">
                    Spin the Wheel
                </button>
                <a href="userdashboard.html"
                    class="block w-full bg-slate-50 hover:bg-slate-100 text-slate-650 font-bold text-xs uppercase tracking-widest py-3 px-4 rounded-xl border border-slate-250 text-center active:scale-[0.98] transition-all">
                    Cancel & Return
                </a>
            </div>

        </div>
    </main>

    <script>
        // Define reward tiers
        const sectors = [
            { label: "KES 5.00", value: 5, color: "#F9FAFB" },
            { label: "KES 10.00", value: 10, color: "#F1F5F9" },
            { label: "KES 20.00", value: 20, color: "#EEF2F6" },
            { label: "KES 2.00", value: 2, color: "#F9FAFB" },
            { label: "KES 50.00", value: 50, color: "#ECFDF5" },
            { label: "KES 15.00", value: 15, color: "#FFFBEB" },
            { label: "KES 0.00", value: 0, color: "#FFF1F2" },
            { label: "KES 25.00", value: 25, color: "#EEF2F6" }
        ];

        const canvas = document.getElementById("wheel-canvas");
        const ctx = canvas.getContext("2d");
        const numSectors = sectors.length;
        const arcSize = (2 * Math.PI) / numSectors;

        let currentRotationAngle = 0;
        let isCurrentlySpinning = false;

        // Render Canvas Wheel Segments
        function drawWheelGraphic() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 5;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numSectors; i++) {
                const angle = currentRotationAngle + (i * arcSize);

                // Draw sector arc background
                ctx.beginPath();
                ctx.fillStyle = sectors[i].color;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arcSize);
                ctx.lineTo(centerX, centerY);
                ctx.fill();
                ctx.strokeStyle = "rgba(0,0,0,0.05)";
                ctx.lineWidth = 1;
                ctx.stroke();

                // Render sector label text
                ctx.save();
                ctx.fillStyle = "#334155";
                ctx.font = "bold 11px monospace";
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillText(sectors[i].label, radius - 15, 4);
                ctx.restore();
            }

            // Draw center metallic core
            ctx.beginPath();
            ctx.arc(centerX, centerY, 14, 0, 2 * Math.PI);
            ctx.fillStyle = "#FFFFFF";
            ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            ctx.stroke();
        }

        let currentUser = null;

        document.addEventListener("DOMContentLoaded", () => {
            const loggedInUserStr = localStorage.getItem("logged_in_user");
            if (!loggedInUserStr) {
                window.location.href = "../public/signin.html";
                return;
            }
            currentUser = JSON.parse(loggedInUserStr);
            drawWheelGraphic();
        });

        // Programmatic rotation mechanics
        function executeSpinSequence() {
            if (isCurrentlySpinning || !currentUser) return;

            isCurrentlySpinning = true;
            const spinBtn = document.getElementById("spin-trigger-btn");
            spinBtn.setAttribute("disabled", "true");
            spinBtn.classList.add("opacity-50", "cursor-not-allowed");

            const targetedSectorIndex = Math.floor(Math.random() * numSectors);

            const extraRadianRotations = 4 * 2 * Math.PI;
            const finalPointerStopAngle = (2 * Math.PI) - (targetedSectorIndex * arcSize) - (arcSize / 2);

            const startAngle = currentRotationAngle % (2 * Math.PI);
            const deltaAngle = extraRadianRotations + finalPointerStopAngle - startAngle;

            let animationStartTime = null;
            const duration = 4000;

            function animationStep(timestamp) {
                if (!animationStartTime) animationStartTime = timestamp;
                const elapsed = timestamp - animationStartTime;
                const progress = Math.min(elapsed / duration, 1);

                const easeOutProgress = 1 - Math.pow(1 - progress, 3);

                currentRotationAngle = startAngle + (deltaAngle * easeOutProgress);
                drawWheelGraphic();

                if (progress < 1) {
                    requestAnimationFrame(animationStep);
                } else {
                    isCurrentlySpinning = false;
                    const winningUnit = sectors[targetedSectorIndex];

                    setTimeout(async () => {
                        try {
                            const response = await fetch('/api/users/spin', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    userId: currentUser.id,
                                    amount: winningUnit.value
                                })
                            });

                            const data = await response.json();
                            if (data.success) {
                                alert(`Spin complete! You won: ${winningUnit.label}. This reward has been added to your balance.`);
                            } else {
                                alert(data.message || "You have already spun today. Try again tomorrow.");
                            }
                        } catch (error) {
                            console.error("Spin error:", error);
                            alert("Network error crediting spin reward.");
                        }
                        window.location.href = "userdashboard.html";
                    }, 300);
                }
            }

            requestAnimationFrame(animationStep);
        }
    </script>

    <!-- Consistent Footer -->
    <footer class="border-t border-slate-200 bg-white py-6 text-center text-[10px] font-mono font-bold tracking-wider text-slate-500 uppercase mt-12">
        <p>© 2026 PESAQUASH AGENCIES. ALL RIGHTS RESERVED.</p>
    </footer>

</body>

</html>
