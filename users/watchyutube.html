<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch YouTube | PESAQUASH</title>
    <!-- Tailwind CSS Script -->
    <!-- Tailwind CSS Script -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/reco-theme.css">
    <!-- Currency Conversion Manager -->
    <script src="../public/js/currency-manager.js"></script>
    <!-- Custom Alerts Library -->
    <script src="../public/js/system-alerts.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem("maintenance_mode") === "true") {
                document.body.innerHTML = `
                    <div class="min-h-screen bg-[#F8FAFC] flex flex-col justify-center items-center px-4 font-sans selection:bg-rose-500/10 selection:text-rose-900">
                        <div class="max-w-md w-full glass-card bg-blue-50/50 border border-blue-200/60 p-8 rounded-2xl shadow-xl text-center space-y-5">
                            <div class="h-12 w-12 bg-blue-50 border border-blue-200/60 text-blue-600 rounded-full flex items-center justify-center mx-auto text-xl animate-bounce">⚙️</div>
                            <h2 class="text-xl font-black text-slate-900 uppercase font-mono tracking-wider">System Under Maintenance</h2>
                            <p class="text-xs text-slate-500 font-semibold leading-relaxed">
                                PESAQUASH is currently undergoing scheduled upgrades. Access to the member workspace is temporarily suspended.
                            </p>
                            <div class="pt-2">
                                <a href="../public/signin.html" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase tracking-wider py-3.5 px-6 rounded-xl transition-all shadow-xs">
                                    Return to Log In
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                document.body.className = "bg-[#F8FAFC] min-h-screen flex flex-col justify-center items-center";
            } else if (localStorage.getItem("force_logout") === "true") {
                localStorage.removeItem("logged_in_user");
                localStorage.removeItem("force_logout");
                alert("The administrator has closed the session. You have been logged out.");
                window.location.href = "../public/signin.html";
            }
        });
    </script>
</head>

<body
    class="antialiased min-h-screen flex flex-col font-semibold">

    <!-- Top Sticky Header -->
    <header class="sticky top-0 bg-white border-b border-slate-200/80 shadow-xs z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-lg font-black tracking-wider text-slate-900 uppercase font-mono">YouTube Task</span>
            </div>

            <div class="flex items-center space-x-3">
                <!-- Currency Toggle Selector -->
                <div class="flex items-center bg-slate-100 rounded-xl p-0.5 border border-blue-100 shrink-0">
                    <button onclick="setGlobalCurrency('KES')" id="currency-toggle-kes" class="px-2.5 py-1 rounded-lg text-[11px] font-extrabold transition-all cursor-pointer">KES</button>
                    <button onclick="setGlobalCurrency('USD')" id="currency-toggle-usd" class="px-2.5 py-1 rounded-lg text-[11px] font-extrabold transition-all cursor-pointer">USD</button>
                </div>
                <!-- Notification Bell -->
                <button onclick="alert('No new notifications')" class="relative p-2 text-slate-500 hover:text-blue-600 transition bg-slate-50 hover:bg-slate-100 rounded-xl border border-slate-200 shadow-xs focus:outline-none cursor-pointer">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <span class="absolute top-1.5 right-1.5 h-2 w-2 bg-blue-600 rounded-full ring-2 ring-white"></span>
                </button>
                <!-- Profile Avatar -->
                <a href="userprofile.html" class="p-2 text-slate-500 hover:text-blue-600 transition bg-slate-50 hover:bg-slate-100 rounded-xl border border-slate-200 shadow-xs">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Campaign Framework -->
    <main class="flex-1 max-w-2xl mx-auto w-full px-4 py-8 flex flex-col justify-center">

        <div class="text-center mb-6">
            <span class="text-[10px] bg-blue-50 text-blue-700 px-2.5 py-1 rounded-md border border-blue-100 font-mono font-bold uppercase tracking-wider inline-block mb-2">YouTube Video Task</span>
            <h1 class="text-xl font-bold text-slate-900 tracking-tight">Watch YouTube Video</h1>
            <p class="text-xs text-slate-500 mt-1">Watch this video to earn your reward. Do not close this page.</p>
        </div>

        <!-- Master Interface Layout -->
        <div
            class="glass-card bg-blue-50/50 rounded-2xl shadow-xl shadow-slate-100/40 p-4 border border-blue-200/60 overflow-hidden">

            <!-- Widescreen Simulated Player Frame -->
            <div id="video-player-container"
                class="w-full aspect-video bg-slate-950 rounded-xl relative overflow-hidden flex items-center justify-center border border-slate-900 group shadow-inner">

                <!-- Mock Placeholder representing an embedded YouTube player -->
                <div
                    class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 text-slate-400 z-10 select-none">
                    <svg class="h-12 w-12 text-blue-500 mb-4 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="text-sm font-bold text-white font-mono tracking-wide uppercase">YouTube Video Playing</p>
                    <p class="text-[10px] text-slate-500 mt-1.5 max-w-[280px]">Simulated widescreen YouTube video player</p>
                </div>

                <div
                    class="absolute inset-0 bg-radial from-transparent via-black/40 to-black/80 pointer-events-none z-20">
                </div>
            </div>

            <!-- Control Console -->
            <div class="mt-4 pt-4 border-t border-blue-200/50 space-y-4">

                <!-- Timer -->
                <div
                    class="flex items-center justify-between bg-slate-100 px-4 py-3 rounded-xl border border-slate-200 font-mono">
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Time Remaining <span id="timer-status-text" class="text-rose-600 font-bold ml-1"> (Paused - Play Video)</span></span>
                    <div class="flex items-center gap-1.5 text-sm font-black text-blue-600"
                        id="timer-display-container">
                        <svg class="h-4 w-4 text-blue-500 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span id="countdown-timer">30</span>s
                    </div>
                </div>

                <!-- Claim Button -->
                <div class="space-y-3">
                    <button id="claim-btn" disabled onclick="triggerClaimEvent()"
                        class="w-full disabled:bg-slate-100 disabled:text-slate-400 disabled:border-slate-200 disabled:cursor-not-allowed bg-blue-600 hover:bg-blue-700 text-white border border-transparent font-bold text-xs uppercase tracking-widest py-4 px-4 rounded-xl shadow-xs transition-all text-center">
                        Claim Reward (Locked)
                    </button>
                    <a href="userdashboard.html"
                        class="block w-full bg-slate-50 hover:bg-slate-100 text-slate-650 font-bold text-xs uppercase tracking-widest py-3 px-4 rounded-xl border border-slate-250 text-center active:scale-[0.98] transition-all">
                        Cancel & Return
                    </a>
                </div>

        </div>
    </main>

    <script>
        let currentTaskId = null;
        let currentUser = null;
        let player = null;
        let timerPaused = true;
        let timeLeft = 30;
        let trackerInterval = null;
        let isRedirectTask = false;

        // Load YouTube Iframe API dynamically
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = function() {
            // YT API Loaded
        };

        function onPlayerStateChange(event) {
            // event.data: 1 = PLAYING, 2 = PAUSED, 0 = ENDED
            if (event.data === YT.PlayerState.PLAYING) {
                resumeTimer();
            } else {
                pauseTimer();
            }
        }

        function getVideoEmbedHtml(url, type) {
            if (!url) return '';
            if (type === 'youtube') {
                let videoId = '';
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = url.match(regExp);
                if (match && match[2]) {
                    videoId = match[2].trim();
                }
                if (videoId && videoId.length === 11) {
                    isRedirectTask = false;
                    return `<div id="youtube-player" class="absolute inset-0 w-full h-full rounded-xl"></div>`;
                } else {
                    isRedirectTask = true;
                    return `
                        <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 bg-slate-950 rounded-xl select-none z-10">
                            <svg class="h-12 w-12 text-blue-500 mb-4 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                            <p class="text-sm font-bold text-white uppercase tracking-wider mb-2">Open Video Link</p>
                            <p class="text-[11px] text-slate-400 mb-4 max-w-[240px]">This video must be viewed directly. Click the button below to watch and keep this page open for your rewards.</p>
                            <a href="${url}" target="_blank" onclick="resumeTimer()" class="bg-blue-600 hover:bg-blue-700 text-white font-extrabold text-[11px] py-2.5 px-5 rounded-xl transition-all shadow-md transform active:scale-95 inline-block">
                                Watch Video on YouTube ↗
                            </a>
                        </div>
                    `;
                }
            } else if (type === 'tiktok') {
                let username = 'pesaquash';
                let tiktokId = '';
                
                const pathRegex = /@([^\/]+)\/video\/(\d+)/;
                const pathMatch = url.match(pathRegex);
                if (pathMatch) {
                    username = pathMatch[1];
                    tiktokId = pathMatch[2];
                } else {
                    const idRegex = /\/video\/(\d+)/;
                    const idMatch = url.match(idRegex);
                    if (idMatch) {
                        tiktokId = idMatch[1];
                    }
                }
                
                if (tiktokId) {
                    isRedirectTask = false;
                    timerPaused = false;
                    
                    setTimeout(() => {
                        const oldScript = document.getElementById("tiktok-embed-script");
                        if (oldScript) oldScript.remove();
                        const script = document.createElement('script');
                        script.id = "tiktok-embed-script";
                        script.src = "https://www.tiktok.com/embed.js";
                        script.async = true;
                        document.body.appendChild(script);
                    }, 50);

                    return `
                        <div class="absolute inset-0 w-full h-full flex items-center justify-center bg-black rounded-xl overflow-hidden">
                            <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@${username}/video/${tiktokId}" data-video-id="${tiktokId}" style="width:100%; height:100%; margin:0;">
                                <section class="text-white text-center p-4">Loading video...</section>
                            </blockquote>
                        </div>
                    `;
                } else {
                    isRedirectTask = true;
                    timerPaused = true;
                    return `
                        <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 bg-slate-950 rounded-xl select-none z-10">
                            <svg class="h-12 w-12 text-purple-500 mb-4 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                            <p class="text-sm font-bold text-white uppercase tracking-wider mb-2">Open Video Link</p>
                            <p class="text-[11px] text-slate-400 mb-4 max-w-[240px]">This video must be viewed directly. Click the button below to watch and keep this page open for your rewards.</p>
                            <a href="${url}" target="_blank" onclick="resumeTimer()" class="bg-purple-600 hover:bg-purple-700 text-white font-extrabold text-[11px] py-2.5 px-5 rounded-xl transition-all shadow-md transform active:scale-95 inline-block">
                                Watch Video on TikTok ↗
                            </a>
                        </div>
                    `;
                }
            }
            return `<iframe class="absolute inset-0 w-full h-full rounded-xl" src="${url}" frameborder="0" allowfullscreen></iframe>`;
        }

        document.addEventListener("DOMContentLoaded", async () => {
            const loggedInUserStr = localStorage.getItem("logged_in_user");
            if (!loggedInUserStr) {
                window.location.href = "../public/signin.html";
                return;
            }
            currentUser = JSON.parse(loggedInUserStr);

            try {
                const response = await fetch(`/api/users/tasks?userId=${currentUser.id}&type=youtube`);
                const data = await response.json();
                if (data.success && data.tasks.length > 0) {
                    const task = data.tasks[0];
                    currentTaskId = task.id;

                    document.querySelector("h1").innerText = task.title;
                    document.getElementById("claim-btn").innerText = `Claim KES ${parseFloat(task.reward).toFixed(2)} Reward (Locked)`;
                    
                    const playerContainer = document.getElementById("video-player-container");
                    if (playerContainer) {
                        playerContainer.innerHTML = getVideoEmbedHtml(task.url_or_question, 'youtube');
                        
                        if (!isRedirectTask) {
                            let videoId = '';
                            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                            const match = task.url_or_question.match(regExp);
                            if (match && match[2]) {
                                videoId = match[2].trim();
                            }
                            
                            const checkYTApi = setInterval(() => {
                                if (typeof YT !== 'undefined' && YT.Player) {
                                    clearInterval(checkYTApi);
                                    player = new YT.Player('youtube-player', {
                                        height: '100%',
                                        width: '100%',
                                        videoId: videoId,
                                        playerVars: {
                                            'autoplay': 0,
                                            'controls': 1,
                                            'rel': 0,
                                            'modestbranding': 1
                                        },
                                        events: {
                                            'onStateChange': onPlayerStateChange
                                        }
                                    });
                                }
                            }, 100);
                        }
                    }
                    
                    startTimer(task.reward);
                } else {
                    document.getElementById("timer-display-container").innerHTML = "❌ No Tasks";
                    document.getElementById("claim-btn").innerText = "No YouTube Tasks Available";
                    document.getElementById("claim-btn").setAttribute("disabled", "true");
                }
            } catch (error) {
                console.error("Failed to load YouTube task:", error);
            }
        });

        // Tab focus detection
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                pauseTimer();
                if (player && typeof player.pauseVideo === "function") {
                    player.pauseVideo();
                }
            } else {
                if (isRedirectTask) {
                    resumeTimer();
                }
            }
        });

        function pauseTimer() {
            timerPaused = true;
            const timerText = document.getElementById("timer-status-text");
            if (timerText) {
                timerText.textContent = " (Paused - Play Video)";
                timerText.className = "text-rose-600 font-bold ml-1 animate-pulse";
            }
        }

        function resumeTimer() {
            timerPaused = false;
            const timerText = document.getElementById("timer-status-text");
            if (timerText) {
                timerText.textContent = " (Active)";
                timerText.className = "text-emerald-600 font-bold ml-1";
            }
        }

        function startTimer(reward) {
            timeLeft = 30;
            const timerElement = document.getElementById("countdown-timer");
            const claimButton = document.getElementById("claim-btn");

            trackerInterval = setInterval(() => {
                if (timerPaused) return;

                timeLeft--;
                timerElement.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(trackerInterval);
                    trackerInterval = null;

                    document.getElementById("timer-display-container").innerHTML = "✅ Verified";
                    const statusText = document.getElementById("timer-status-text");
                    if (statusText) statusText.style.display = "none";

                    claimButton.removeAttribute("disabled");
                    claimButton.innerText = `Claim KES ${parseFloat(reward).toFixed(2)} Reward`;
                    claimButton.classList.replace("disabled:cursor-not-allowed", "cursor-pointer");
                }
            }, 1000);
        }

        async function triggerClaimEvent() {
            if (!currentUser || !currentTaskId) return;

            try {
                const response = await fetch('/api/users/complete-task', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: currentUser.id,
                        taskId: currentTaskId
                    })
                });

                const data = await response.json();
                if (data.success) {
                    alert(data.message || "Reward credited successfully!");
                    window.location.href = "userdashboard.html";
                } else {
                    alert(data.message || "Failed to claim reward.");
                }
            } catch (error) {
                console.error("Claim task error:", error);
                alert("Network error claiming reward.");
            }
        }
    </script>
    <!-- Consistent Footer -->
    <footer class="border-t border-slate-200 bg-white py-6 text-center text-[10px] font-mono font-bold tracking-wider text-slate-500 uppercase mt-12">
        <p>© 2026 PESAQUASH AGENCIES. ALL RIGHTS RESERVED.</p>
    </footer>

</body>

</html>
