<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Trivia | PESAQUASH</title>
    <!-- Tailwind CSS Script -->
    <!-- Tailwind CSS Script -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/reco-theme.css">
    <!-- Currency Conversion Manager -->
    <script src="../public/js/currency-manager.js"></script>
    <!-- Custom Alerts Library -->
    <script src="../public/js/system-alerts.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem("maintenance_mode") === "true") {
                document.body.innerHTML = `
                    <div class="min-h-screen bg-[#F8FAFC] flex flex-col justify-center items-center px-4 font-sans selection:bg-rose-500/10 selection:text-rose-900">
                        <div class="max-w-md w-full glass-card bg-blue-50/50 border border-blue-200/60 p-8 rounded-2xl shadow-xl text-center space-y-5">
                            <div class="h-12 w-12 bg-blue-50 border border-blue-200/60 text-blue-600 rounded-full flex items-center justify-center mx-auto text-xl animate-bounce">⚙️</div>
                            <h2 class="text-xl font-black text-slate-900 uppercase font-mono tracking-wider">System Under Maintenance</h2>
                            <p class="text-xs text-slate-500 font-semibold leading-relaxed">
                                PESAQUASH is currently undergoing scheduled upgrades. Access to the member workspace is temporarily suspended.
                            </p>
                            <div class="pt-2">
                                <a href="../public/signin.html" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase tracking-wider py-3.5 px-6 rounded-xl transition-all shadow-xs">
                                    Return to Log In
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                document.body.className = "bg-[#F8FAFC] min-h-screen flex flex-col justify-center items-center";
            } else if (localStorage.getItem("force_logout") === "true") {
                localStorage.removeItem("logged_in_user");
                localStorage.removeItem("force_logout");
                alert("The administrator has closed the session. You have been logged out.");
                window.location.href = "../public/signin.html";
            }
        });
    </script>
</head>

<body
    class="antialiased min-h-screen flex flex-col font-semibold">

    <!-- Top Sticky Header -->
    <header class="sticky top-0 bg-white border-b border-slate-200/80 shadow-xs z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-lg font-black tracking-wider text-slate-900 uppercase font-mono">Trivia Quiz</span>
            </div>

            <div class="flex items-center space-x-3">
                <!-- Currency Toggle Selector -->
                <div class="flex items-center bg-slate-100 rounded-xl p-0.5 border border-blue-100 shrink-0">
                    <button onclick="setGlobalCurrency('KES')" id="currency-toggle-kes" class="px-2.5 py-1 rounded-lg text-[11px] font-extrabold transition-all cursor-pointer">KES</button>
                    <button onclick="setGlobalCurrency('USD')" id="currency-toggle-usd" class="px-2.5 py-1 rounded-lg text-[11px] font-extrabold transition-all cursor-pointer">USD</button>
                </div>
                <!-- Notification Bell -->
                <button onclick="alert('No new notifications')" class="relative p-2 text-slate-500 hover:text-blue-600 transition bg-slate-50 hover:bg-slate-100 rounded-xl border border-slate-200 shadow-xs focus:outline-none cursor-pointer">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <span class="absolute top-1.5 right-1.5 h-2 w-2 bg-blue-600 rounded-full ring-2 ring-white"></span>
                </button>
                <!-- Profile Avatar -->
                <a href="userprofile.html" class="p-2 text-slate-500 hover:text-blue-600 transition bg-slate-50 hover:bg-slate-100 rounded-xl border border-slate-200 shadow-xs">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content Frame -->
    <main class="flex-1 max-w-xl mx-auto w-full px-4 py-8 flex flex-col justify-center">

        <div class="text-center mb-6">
            <span class="text-[10px] bg-purple-50 text-purple-700 px-2.5 py-1 rounded-md border border-purple-100 font-mono font-bold uppercase tracking-wider inline-block mb-2">Daily Trivia</span>
            <h1 class="text-xl font-bold text-slate-900 tracking-tight">Today's Trivia Question</h1>
            <p class="text-xs text-slate-500 mt-1">Answer correctly to unlock your cash reward.</p>
        </div>

        <!-- Master Trivia Interface Card -->
        <div class="glass-card bg-purple-50/80 rounded-2xl shadow-xl shadow-slate-100/40 p-6 border border-purple-200/60">

             <!-- Session Grid Timer Indicator Widget -->
             <div
                 class="flex items-center justify-between bg-blue-50 border border-blue-100 px-4 py-2.5 rounded-xl mb-6 font-mono text-xs">
                 <span class="text-blue-700 font-bold uppercase tracking-wider text-[10px]">Time Remaining</span>
                 <span class="font-black text-blue-600 text-sm flex items-center gap-1.5" id="clock-display">
                     <svg class="h-4 w-4 text-blue-500 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                         <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                     </svg>
                     <span id="timer-text">02:00</span>
                 </span>
             </div>

            <!-- Question -->
            <div class="mb-6">
                <span class="text-[9px] font-mono font-bold uppercase tracking-wider text-slate-400 block mb-1">Trivia Question</span>
                <h2 id="trivia-question-text" class="text-base font-bold text-slate-900 leading-snug">
                    Loading trivia question...
                </h2>
            </div>

            <!-- Options Form -->
            <form id="quiz-form" onsubmit="evaluateSubmission(event)" class="space-y-3">
                <div id="choices-container" class="space-y-3">
                    <!-- Dynamic choices injected here -->
                </div>

                <!-- Submit Button -->
                <div class="pt-4 space-y-3">
                    <button type="submit" id="submit-btn" disabled
                        class="w-full disabled:bg-slate-100 disabled:text-slate-400 disabled:border-slate-200 disabled:cursor-not-allowed bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs uppercase tracking-widest py-4 px-4 rounded-xl shadow-md active:scale-[0.98] transition-all cursor-pointer text-center">
                        Submit Answer
                    </button>
                    <a href="userdashboard.html"
                        class="block w-full bg-slate-50 hover:bg-slate-100 text-slate-650 font-bold text-xs uppercase tracking-widest py-3 px-4 rounded-xl border border-slate-250 text-center active:scale-[0.98] transition-all">
                        Cancel & Return
                    </a>
                </div>
            </form>

        </div>
    </main>

    <script>
        let totalSecondsLeft = 120;
        let countdownLoop = null;
        let currentTaskId = null;
        let correctAnswer = null;
        let currentUser = null;

        document.addEventListener("DOMContentLoaded", async () => {
            const loggedInUserStr = localStorage.getItem("logged_in_user");
            if (!loggedInUserStr) {
                window.location.href = "../public/signin.html";
                return;
            }
            currentUser = JSON.parse(loggedInUserStr);

            try {
                const response = await fetch(`/api/users/tasks?userId=${currentUser.id}&type=trivia`);
                const data = await response.json();
                if (data.success && data.tasks.length > 0) {
                    const task = data.tasks[0];
                    currentTaskId = task.id;
                    correctAnswer = task.correct_answer;

                    document.getElementById("trivia-question-text").innerText = task.title;

                    // Parse options
                    const options = JSON.parse(task.options);
                    const container = document.getElementById("choices-container");
                    container.innerHTML = "";

                    options.forEach((opt, index) => {
                        const letter = String.fromCharCode(65 + index); // A, B, C, D...
                        const label = document.createElement("label");
                        label.className = "flex items-center p-3.5 rounded-xl border border-slate-200 bg-slate-50/40 cursor-pointer transition-all hover:bg-slate-50 hover:border-slate-300 relative group";
                        label.innerHTML = `
                            <input type="radio" name="trivia_choice" value="${opt}" required
                                class="h-4 w-4 text-blue-600 border-slate-300 focus:ring-blue-500">
                            <span class="ml-3.5 text-xs font-semibold text-slate-750 font-mono"><b class="font-black mr-1">${letter}.</b>
                                ${opt}</span>
                        `;
                        container.appendChild(label);
                    });

                    document.getElementById("submit-btn").removeAttribute("disabled");
                    startCountdown();
                } else {
                    document.getElementById("trivia-question-text").innerText = "No trivia quizzes available today.";
                    document.getElementById("choices-container").innerHTML = "<p class='text-xs text-slate-400 font-semibold italic text-center py-4'>Please check back later for new trivia rewards.</p>";
                }
            } catch (error) {
                console.error("Failed to load trivia task:", error);
            }
        });

        function startCountdown() {
            countdownLoop = setInterval(() => {
                totalSecondsLeft--;

                const minutes = Math.floor(totalSecondsLeft / 60);
                const seconds = totalSecondsLeft % 60;

                document.getElementById("timer-text").innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                if (totalSecondsLeft <= 0) {
                    clearInterval(countdownLoop);
                    alert("Time is up! Your trivia quiz has timed out.");
                    window.location.href = "userdashboard.html";
                }
            }, 1000);
        }

        async function evaluateSubmission(event) {
            event.preventDefault();
            if (countdownLoop) clearInterval(countdownLoop);

            const selectedChoice = document.querySelector('input[name="trivia_choice"]:checked').value;

            if (selectedChoice.trim().toLowerCase() === correctAnswer.trim().toLowerCase()) {
                try {
                    const response = await fetch('/api/users/complete-task', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            userId: currentUser.id,
                            taskId: currentTaskId
                        })
                    });

                    const data = await response.json();
                    if (data.success) {
                        alert(`Correct answer! KES ${parseFloat(data.reward).toFixed(2)} has been added to your wallet balance.`);
                    } else {
                        alert(data.message || "Failed to claim reward.");
                    }
                } catch (error) {
                    console.error("Complete trivia task error:", error);
                    alert("Network error processing reward.");
                }
            } else {
                alert("Incorrect answer! Better luck next time.");
            }
            window.location.href = "userdashboard.html";
        }
    </script>

    <!-- Consistent Footer -->
    <footer class="border-t border-slate-200 bg-white py-6 text-center text-[10px] font-mono font-bold tracking-wider text-slate-500 uppercase mt-12">
        <p>© 2026 PESAQUASH AGENCIES. ALL RIGHTS RESERVED.</p>
    </footer>

</body>

</html>
